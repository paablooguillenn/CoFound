appId: com.cofound.app
name: "Registro y login"
tags:
  - smoke
  - auth
---
# Verifica el flujo de alta nueva: pantalla de bienvenida → registro →
# verificación de email → wizard de creación de perfil. No completa el wizard,
# solo confirma que se llega a él tras un registro válido.
- launchApp:
    clearState: true
- assertVisible: "Crear cuenta"
- assertVisible: "Iniciar sesión"

- tapOn: "Crear cuenta"
- assertVisible: "Crea tu cuenta"

- tapOn:
    id: "Nombre"
- inputText: "Test"
- tapOn:
    id: "Apellidos"
- inputText: "E2E"
- tapOn:
    id: "Correo electrónico"
- inputText: "test-e2e-${TIMESTAMP}@cofound-seed.com"
- tapOn:
    id: "Contraseña"
- inputText: "Cofound2026!"
- tapOn:
    id: "Confirmar contraseña"
- inputText: "Cofound2026!"

- tapOn: "Registrarme"
- assertVisible:
    text: "Verifica tu email"
    timeout: 8000
