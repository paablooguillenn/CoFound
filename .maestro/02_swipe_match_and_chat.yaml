appId: com.cofound.app
name: "Swipe + conexión + chat"
tags:
  - smoke
  - core
---
# Asume que el usuario seed pablo.test@cofound-seed.com (password: password123)
# tiene perfil completo y existen otros perfiles en el feed de discovery.
# Verifica el "happy path" desde Discover hasta enviar el primer mensaje.
- launchApp:
    clearState: true
- tapOn: "Iniciar sesión"
- tapOn:
    id: "Correo electrónico"
- inputText: "pablo.test@cofound-seed.com"
- tapOn:
    id: "Contraseña"
- inputText: "password123"
- tapOn: "Iniciar sesión"

# Discover debe cargar
- assertVisible:
    text: "CoFound"
    timeout: 10000

# Hacer swipe a la derecha (interesa)
- swipe:
    start: 50%, 60%
    end: 90%, 60%
    duration: 350

# Si hay match, navegar al chat
- runFlow:
    when:
      visible: "¡Conexión establecida!"
    commands:
      - tapOn: "Enviar primer mensaje"
      - assertVisible:
          text: "está en línea"
          timeout: 5000
      - tapOn:
          id: "messageInput"
      - inputText: "Hola, encantado de conectar"
      - tapOn:
          id: "sendBtn"
      - assertVisible:
          text: "Hola, encantado de conectar"
          timeout: 3000
