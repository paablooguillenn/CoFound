appId: com.cofound.app
name: "Pasarela Premium (demo)"
tags:
  - smoke
  - premium
---
# Verifica el flujo de upgrade a Premium en modo demo: Pricing → Checkout →
# Success. No se realiza ningún cargo real (banner de "Modo demo" visible).
- launchApp:
    clearState: false
- tapOn:
    text: "Iniciar sesión"
    optional: true
- runFlow:
    when:
      visible: "Correo electrónico"
    commands:
      - tapOn:
          id: "Correo electrónico"
      - inputText: "pablo.test@cofound-seed.com"
      - tapOn:
          id: "Contraseña"
      - inputText: "password123"
      - tapOn: "Iniciar sesión"

# Ir a Perfil → banner premium → Pricing
- tapOn: "Perfil"
- tapOn: "Actualizar a Premium"
- assertVisible: "Planes y precios"
- tapOn: "Suscribirme"

# Checkout debe mostrar el banner de modo demo
- assertVisible: "Modo demo"
- tapOn:
    id: "cardNumberInput"
- inputText: "4242 4242 4242 4242"
- tapOn:
    id: "expiryInput"
- inputText: "12/30"
- tapOn:
    id: "cvvInput"
- inputText: "123"
- tapOn: "Confirmar pago"

# Success
- assertVisible:
    text: "¡Pago completado!"
    timeout: 10000
- assertVisible: "Ahora eres Premium"
